name: Upload Artifacts to S3
description: |
  Uploads module artifacts to S3 bucket.

inputs:
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: false
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: false
  github-ref:
    description: 'GitHub ref'
    required: true
  osnick:
    description: 'OS Nickname'
    required: false
    default: ''
  beta-version:
    description: 'Beta version for S3 uploads'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Configure AWS Credentials and upload artifacts
      shell: bash
      run: |
          set -e
          export AWS_REGION=us-east-1
          export AWS_DEFAULT_REGION=us-east-1
          
          echo ::group::install dependencies
          python3 -m venv .aws-cli-venv
          source .aws-cli-venv/bin/activate
          pip3 install --upgrade pip
          pip3 install --no-cache-dir awscli boto3
          rm -rf /var/cache/apk/* || true
          echo ::endgroup::
          
          echo ::group::configure AWS credentials
          # Ensure venv is activated
          source .aws-cli-venv/bin/activate
          # Use GitHub OIDC to assume AWS role (no Node.js required)
          # GitHub Actions provides OIDC token via ACTIONS_ID_TOKEN_REQUEST_TOKEN and ACTIONS_ID_TOKEN_REQUEST_URL
          ROLE_ARN="arn:aws:iam::168085023892:role/GitHubRedisTimeSeriesS3Upload"
          ROLE_SESSION_NAME="GitHub_to_AWS_S3_Upload"
          
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            # Get OIDC token from GitHub
            OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c "import sys, json; print(json.load(sys.stdin).get('value', ''))")
            
            if [ -n "$OIDC_TOKEN" ]; then
              # Use AWS CLI to assume role with web identity (works without initial AWS credentials)
              CREDS_JSON=$(aws sts assume-role-with-web-identity \
                --role-arn "$ROLE_ARN" \
                --role-session-name "$ROLE_SESSION_NAME" \
                --web-identity-token "$OIDC_TOKEN" \
                --region us-east-1 \
                --output json 2>/dev/null || echo "")
              
              if [ -n "$CREDS_JSON" ]; then
                export AWS_ACCESS_KEY_ID=$(echo "$CREDS_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['Credentials']['AccessKeyId'])")
                export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['Credentials']['SecretAccessKey'])")
                export AWS_SESSION_TOKEN=$(echo "$CREDS_JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['Credentials']['SessionToken'])")
                echo "AWS credentials configured successfully via OIDC"
              else
                echo "Warning: Failed to assume role via OIDC, trying fallback"
                CREDS_JSON=""
              fi
            else
              echo "Warning: Failed to get OIDC token"
              CREDS_JSON=""
            fi
          fi
          
          # Fallback to provided credentials if OIDC didn't work
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            if [ -n "${{ inputs.aws-access-key-id }}" ] && [ -n "${{ inputs.aws-secret-access-key }}" ]; then
              export AWS_ACCESS_KEY_ID="${{ inputs.aws-access-key-id }}"
              export AWS_SECRET_ACCESS_KEY="${{ inputs.aws-secret-access-key }}"
              echo "Using provided AWS credentials"
            else
              echo "Error: No credentials available (neither OIDC nor provided credentials)"
              exit 1
            fi
          fi

          if [[ -n "${{ inputs.osnick }}" ]]; then
            export OSNICK="${{ inputs.osnick }}"
          fi
          echo ::endgroup::
          
          echo ::group::upload artifacts
            SNAPSHOT=1 SHOW=1 VERBOSE=1 ./sbin/upload-artifacts
          echo ::endgroup::
          echo ::group::upload staging release
            RELEASE=1 SHOW=1 STAGING=1 VERBOSE=1 ./sbin/upload-artifacts
          echo ::endgroup::
          
          echo ::group::upload production release
            REF="${{ inputs.github-ref }}"
            PATTERN="refs/tags/v[0-9]+.*"
            if [[ $REF =~ $PATTERN ]]; then
              echo "This is a tagged build"
              RELEASE=1 SHOW=1 VERBOSE=1 ./sbin/upload-artifacts
            fi
          echo ::endgroup::
          
          echo ::group::upload to beta folder with version
            # Use provided beta version if available
            if [[ -n "${{ inputs.beta-version }}" ]]; then
              BETA_VERSION="${{ inputs.beta-version }}"
              echo "Using provided beta version: ${BETA_VERSION}"
              
              # Upload to beta folder
              export BETA_VERSION="${BETA_VERSION}"
              BETA=1 SHOW=1 VERBOSE=1 ./sbin/upload-artifacts
            else
              echo "No beta version provided, skipping beta upload"
            fi
          echo ::endgroup::
