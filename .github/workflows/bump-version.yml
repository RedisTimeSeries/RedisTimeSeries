name: Bump Version


on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: bump-version
  cancel-in-progress: false


jobs:
  validate-and-check:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.derive-branch.outputs.release_branch }}
    steps:
      - name: Validate version format and derive release branch
        id: derive-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected format: MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "Version format validated: $VERSION"
          RELEASE_BRANCH=$(echo "$VERSION" | cut -d. -f1,2)
          echo "Derived release branch: $RELEASE_BRANCH"
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

  bump-version:
    needs: validate-and-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: RedisTimeSeries

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-check.outputs.release_branch }}
          path: release-branch
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if tag already exists
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          echo "Tag v$VERSION does not exist, proceeding..."

      - name: Check if bump branch already exists
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          BRANCH="bump-version-v$VERSION"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists on remote"
            exit 1
          fi
          echo "Branch $BRANCH does not exist, proceeding..."

      - name: Configure Git
        working-directory: release-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create bump branch
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git checkout -b "bump-version-v$VERSION"

      - name: Set version
        shell: python
        env:
          VERSION: ${{ inputs.version }}
        run: |
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ['VERSION']
          major, minor, patch = map(int, version.split('.'))
          version_file = Path('release-branch/src/version.h')

          if not version_file.exists():
              print(f"::error::Version file not found: {version_file}")
              sys.exit(1)

          content = version_file.read_text()

          cur_major = re.search(r'#define REDISTIMESERIES_VERSION_MAJOR (\d+)', content)
          cur_minor = re.search(r'#define REDISTIMESERIES_VERSION_MINOR (\d+)', content)
          cur_patch = re.search(r'#define REDISTIMESERIES_VERSION_PATCH (\d+)', content)

          if not all([cur_major, cur_minor, cur_patch]):
              print("::error::Could not parse current version from version.h")
              sys.exit(1)

          print(f"Current version: {cur_major.group(1)}.{cur_minor.group(1)}.{cur_patch.group(1)}")

          content = re.sub(r'(#define REDISTIMESERIES_VERSION_MAJOR )\d+', rf'\g<1>{major}', content)
          content = re.sub(r'(#define REDISTIMESERIES_VERSION_MINOR )\d+', rf'\g<1>{minor}', content)
          content = re.sub(r'(#define REDISTIMESERIES_VERSION_PATCH )\d+', rf'\g<1>{patch}', content)

          version_file.write_text(content)
          print(f"Updated to version {major}.{minor}.{patch}")

      - name: Commit version bump
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add src/version.h
          git commit -m "bump version v$VERSION"

      - name: Push bump branch and open auto-merge PR
        if: ${{ !inputs.dry_run }}
        id: open-pr
        working-directory: release-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          BRANCH="bump-version-v$VERSION"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base "$RELEASE_BRANCH" \
            --head "$BRANCH" \
            --title "bump version v$VERSION" \
            --body "Automated version bump to v$VERSION on \`$RELEASE_BRANCH\`.")
          echo "Opened PR: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          gh pr merge "$PR_URL" --auto --squash
          echo "Auto-merge enabled (squash); PR will merge once all required checks pass."

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          echo "::notice::DRY RUN - Branch was not pushed and no PR was opened"
          echo "Would have:"
          echo "  - Pushed branch: bump-version-v$VERSION"
          echo "  - Opened PR into: $RELEASE_BRANCH"
          echo "  - Enabled auto-merge (squash) on the PR"
          git log -1 --oneline

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
          REF_NAME: ${{ github.ref_name }}
          DRY_RUN: ${{ inputs.dry_run }}
          PR_URL: ${{ steps.open-pr.outputs.pr_url }}
        run: |
          echo "## Bump Version Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Branch**: $RELEASE_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Branch**: bump-version-v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered From**: $REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: $DRY_RUN" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$PR_URL" ]]; then
            echo "- **Pull Request**: $PR_URL" >> $GITHUB_STEP_SUMMARY
            echo "- **Auto-merge**: enabled (squash)" >> $GITHUB_STEP_SUMMARY
          fi
