name: Bump Version


on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to set (format: MAJOR.MINOR.PATCH, e.g., 8.4.8)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: bump-version
  cancel-in-progress: false


jobs:
  validate-and-check:
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.derive-branch.outputs.release_branch }}
    steps:
      - name: Validate version format and derive release branch
        id: derive-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected format: MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "Version format validated: $VERSION"
          RELEASE_BRANCH=$(echo "$VERSION" | cut -d. -f1,2)
          echo "Derived release branch: $RELEASE_BRANCH"
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

  bump-version:
    needs: validate-and-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.RELEASE_AUTOMATION_APP_PRIVATE_KEY }}
          owner: RedisTimeSeries

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-check.outputs.release_branch }}
          path: release-branch
          fetch-depth: 0

      - name: Check if tag already exists
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          echo "Tag v$VERSION does not exist, proceeding..."

      - name: Configure Git
        working-directory: release-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set version
        shell: python
        env:
          VERSION: ${{ inputs.version }}
        run: |
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ['VERSION']
          major, minor, patch = map(int, version.split('.'))
          version_file = Path('release-branch/src/version.h')

          if not version_file.exists():
              print(f"::error::Version file not found: {version_file}")
              sys.exit(1)

          content = version_file.read_text()

          cur_major = re.search(r'#define REDISTIMESERIES_VERSION_MAJOR (\d+)', content)
          cur_minor = re.search(r'#define REDISTIMESERIES_VERSION_MINOR (\d+)', content)
          cur_patch = re.search(r'#define REDISTIMESERIES_VERSION_PATCH (\d+)', content)

          if not all([cur_major, cur_minor, cur_patch]):
              print("::error::Could not parse current version from version.h")
              sys.exit(1)

          print(f"Current version: {cur_major.group(1)}.{cur_minor.group(1)}.{cur_patch.group(1)}")

          content = re.sub(r'(#define REDISTIMESERIES_VERSION_MAJOR )\d+', rf'\g<1>{major}', content)
          content = re.sub(r'(#define REDISTIMESERIES_VERSION_MINOR )\d+', rf'\g<1>{minor}', content)
          content = re.sub(r'(#define REDISTIMESERIES_VERSION_PATCH )\d+', rf'\g<1>{patch}', content)

          version_file.write_text(content)
          print(f"Updated to version {major}.{minor}.{patch}")

      - name: Commit version bump
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add src/version.h
          git commit -m "bump version v$VERSION"

      - name: Create annotated tag
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "v$VERSION" -m "Automated bump to v$VERSION"

      - name: Show commit author and push actor
        working-directory: release-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Commit metadata (HEAD = commit just created):"
          git log -1 --format='  Author:    %an <%ae>%n  Committer: %cn <%ce>%n  Message:   %B'
          echo "Push will be authenticated as: $(gh api /user --jq '.login')"

      - name: Debug git auth (TEMPORARY)
        if: ${{ !inputs.dry_run }}
        working-directory: release-branch
        env:
          GIT_TRACE: 1
          GIT_CURL_VERBOSE: 1
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "--- remotes ---"
          git remote -v
          echo "--- extraheader entries in .git/config ---"
          git config --get-all http.https://github.com/.extraheader || true
          echo "--- ls-remote with persisted credentials ---"
          git ls-remote origin "refs/heads/${RELEASE_BRANCH}" || true
          echo "--- ls-remote with App token via URL only (extraheader suppressed) ---"
          git -c http.extraheader= ls-remote \
            "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" \
            "refs/heads/${RELEASE_BRANCH}" || true

      - name: Push changes
        if: ${{ !inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$RELEASE_BRANCH"
          git push origin "v$VERSION"

      - name: Verify push
        if: ${{ !inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
        run: |
          git ls-remote --exit-code origin "refs/tags/v$VERSION"
          git ls-remote --exit-code origin "refs/heads/$RELEASE_BRANCH"
          echo "Verified: tag and branch exist on remote"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: release-branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "::notice::DRY RUN - Changes were not pushed"
          echo "Would have pushed:"
          echo "  - Commit: bump version v$VERSION"
          echo "  - Tag: v$VERSION"
          git log -1 --oneline
          git tag -l "v$VERSION"

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_BRANCH: ${{ needs.validate-and-check.outputs.release_branch }}
          REF_NAME: ${{ github.ref_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "## Set Version Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Branch**: $RELEASE_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered From**: $REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: $DRY_RUN" >> $GITHUB_STEP_SUMMARY
