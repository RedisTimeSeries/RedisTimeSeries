name: Event CI

permissions:
  id-token: write
  contents: read

on:
  pull_request:
    paths-ignore:
      - 'src/version.h'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-values:
    runs-on: ubuntu-latest
    outputs:
      redis-ref: ${{ steps.set-env.outputs.redis-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: set env
        id: set-env
        run: |
          echo "redis-ref=$(.install/get-redis-ref.sh)" >> $GITHUB_OUTPUT
  linter:
    uses: ./.github/workflows/flow-linter.yml
    secrets: inherit
  # PR builds run a representative OS subset (glibc/RHEL/musl/Debian) and the
  # QUICK test suite (general topology only). The exhaustive OS matrix and the
  # full topology suite (slaves/AOF/AOF+slaves/OSS-cluster) run in
  # event-nightly.yml.
  build-linux-x64:
    uses: ./.github/workflows/flow-linux.yml
    needs: [prepare-values]
    with:
      arch: x64
      os: jammy rocky9 alpine bookworm
      redis-ref: ${{needs.prepare-values.outputs.redis-ref}}
      quick: true
    secrets: inherit
  build-linux-arm64:
    uses: ./.github/workflows/flow-linux.yml
    needs: [prepare-values]
    with:
      arch: arm64
      os: jammy rocky9
      redis-ref: ${{needs.prepare-values.outputs.redis-ref}}
      quick: true
    secrets: inherit
  macos:
    uses: ./.github/workflows/flow-macos.yml
    needs: [prepare-values]
    with:
      os: macos-15
      redis-ref: ${{needs.prepare-values.outputs.redis-ref}}
      quick: true
    secrets: inherit
  linux-valgrind:
    uses: ./.github/workflows/flow-linux.yml
    needs: [prepare-values]
    with:
      arch: x64
      os: jammy
      redis-ref: ${{needs.prepare-values.outputs.redis-ref}}
      quick: true
      run_valgrind: true
    secrets: inherit
  linux-sanitizer:
    uses: ./.github/workflows/flow-linux.yml
    needs: [prepare-values]
    with:
      arch: x64
      os: jammy
      redis-ref: ${{needs.prepare-values.outputs.redis-ref}}
      quick: true
      run_sanitizer: true
    secrets: inherit
