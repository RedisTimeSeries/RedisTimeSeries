name: Push CI Images

permissions:
  contents: read
  packages: write

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      redis-ref:
        description: 'Redis ref to bake into the images'
        type: string
        required: true
        default: 'unstable'
      architecture:
        description: 'Architecture images to build'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - x86
          - arm

jobs:
  setup-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'docker-image-changes')) }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        env:
          ARCHITECTURE: ${{ inputs.architecture || 'all' }}
        run: |
          X86_OS="focal jammy rocky8 rocky9 bullseye amazonlinux2 amazonlinux2023 mariner2 azurelinux3 alpine noble resolute rocky10 alma8 alma9 alma10 bookworm trixie"
          ARM_OS="focal jammy rocky9 azurelinux3 amazonlinux2023 alpine noble resolute rocky8 rocky10 alma8 alma9 alma10 bullseye bookworm trixie mariner2"
          MATRIX="["
          add_platform() {
            local arch="$1"
            local image_arch="$2"
            local runner="$3"
            local platform="$4"
            local os_list="$5"
            for os in $os_list; do
              MATRIX="${MATRIX}{\"arch\":\"${arch}\",\"image_arch\":\"${image_arch}\",\"runner\":\"${runner}\",\"platform\":\"${platform}\",\"os\":\"${os}\",\"variant\":\"\"},"
            done
          }
          if [ "$ARCHITECTURE" = "all" ] || [ "$ARCHITECTURE" = "x86" ]; then
            add_platform "x64" "x86" "ubuntu-22.04" "linux/amd64" "$X86_OS"
            MATRIX="${MATRIX}{\"arch\":\"x64\",\"image_arch\":\"x86\",\"runner\":\"ubuntu-22.04\",\"platform\":\"linux/amd64\",\"os\":\"jammy\",\"variant\":\"sanitizer\"},"
            MATRIX="${MATRIX}{\"arch\":\"x64\",\"image_arch\":\"x86\",\"runner\":\"ubuntu-22.04\",\"platform\":\"linux/amd64\",\"os\":\"jammy\",\"variant\":\"valgrind\"},"
          fi
          if [ "$ARCHITECTURE" = "all" ] || [ "$ARCHITECTURE" = "arm" ]; then
            add_platform "arm64" "arm" "ubuntu-24.04-arm" "linux/arm64" "$ARM_OS"
          fi
          MATRIX="${MATRIX%,}]"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: ${MATRIX}"

  push-images:
    name: ${{ matrix.image.os }}-${{ matrix.image.image_arch }}${{ matrix.image.variant && format('-{0}', matrix.image.variant) || '' }}
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'docker-image-changes')) }}
    needs: setup-matrix
    runs-on: ${{ matrix.image.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      REDIS_REF: ${{ inputs.redis-ref }}
      OS: ${{ matrix.image.os }}
      IMAGE_ARCH: ${{ matrix.image.image_arch }}
      DOCKER_PLATFORM: ${{ matrix.image.platform }}
      VARIANT: ${{ matrix.image.variant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set Redis ref
        run: |
          redis_ref="${REDIS_REF}"
          if [ -z "$redis_ref" ]; then
            redis_ref="$(.install/get-redis-ref.sh)"
          fi
          echo "REDIS_REF=${redis_ref}" >> "$GITHUB_ENV"

      - name: Set Docker Image
        run: |
          repo="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_tag="$(.install/get-image-tag.sh)"
          image_os="$OS"
          if [ -n "$VARIANT" ]; then
            image_os="${image_os}-${VARIANT}"
          fi
          echo "DOCKER_IMAGE=ghcr.io/${repo}/redistimeseries-${IMAGE_ARCH}-${image_os}:${image_tag}" >> "$GITHUB_ENV"

      - name: Build Docker Image
        run: |
          echo "Building ${DOCKER_IMAGE}"
          docker buildx build \
            --platform "${DOCKER_PLATFORM}" \
            -f "Dockerfile.${OS}" \
            --build-arg REDIS_REF="${REDIS_REF}" \
            --build-arg SANITIZER=${{ matrix.image.variant == 'sanitizer' && 'address' || '' }} \
            --build-arg VALGRIND=${{ matrix.image.variant == 'valgrind' && '1' || '' }} \
            -t "${DOCKER_IMAGE}" \
            --load \
            .

      - name: Push Docker Image
        run: |
          echo "Pushing ${DOCKER_IMAGE}"
          docker push "${DOCKER_IMAGE}"
